<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube multi</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #ff0000;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 12px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
        }
        .input-area { display: flex; gap: 6px; }
        input {
            background-color: var(--card-bg);
            border: 1px solid #333;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .input-title { width: 120px; }
        .input-url { width: 220px; }
        
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }
        button:hover { opacity: 0.9; }
        
        .header-right-btns {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }
        .refresh-all-btn { background-color: #3a3a3a; }
        .refresh-all-btn:hover { background-color: #4a4a4a; }
        
        .help-btn {
            background-color: #2a2a2a;
            color: #aaa;
            border: 1px solid #444;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
        .help-btn:hover { background-color: #3a3a3a; color: #fff; }

        .layout-selector {
            display: flex;
            background: var(--card-bg);
            padding: 4px;
            border-radius: 6px;
            gap: 5px;
        }
        .layout-btn {
            background: none;
            color: #aaa;
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .layout-btn.active {
            background: #444;
            color: #fff;
        }
        
        /* ーーー レイアウト構造 ーーー */
        .main-content-area {
            display: grid;
            gap: 15px;
            flex-grow: 1;
            overflow: hidden;
            height: calc(100vh - 85px); 
        }

        .chat-container { 
            display: grid; 
            gap: 15px; 
            height: 100%; 
            overflow-y: hidden;
            align-content: start;
        }

        .chat-box-resizable {
            flex-direction: column; 
            height: calc(100vh - 105px); 
            min-height: 400px;
        }

        /* パターンA: 1画面 ＋ 各コメント欄 */
        .mode-focus-one { grid-template-columns: 2.5fr 1fr; }
        .mode-focus-one .main-video-theater { display: block; background: #000; border-radius: 8px; overflow: hidden; height: 100%; }
        .mode-focus-one .chat-container { display: flex; flex-direction: column; }
        .mode-focus-one .chat-box { flex-grow: 1; min-height: 150px; height: auto; flex-direction: column; } 
        .mode-focus-one .video-frame { display: none !important; }
        .mode-focus-one .chat-frame-container { display: block; height: 100%; }

        @media (max-width: 900px) {
            .mode-focus-one {
                grid-template-columns: 1fr;
                grid-template-rows: 1.8fr 1fr;
            }
            .mode-focus-one .chat-container {
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                gap: 10px;
                height: 100%;
            }
            .mode-focus-one .chat-box {
                flex-shrink: 0;
                width: 280px;
                height: 100%;
            }
        }

        /* パターンB: 各画面 ＋ 各コメント */
        .mode-multi-mix { grid-template-columns: 1fr; }
        .mode-multi-mix .main-video-theater { display: none; }
        .mode-multi-mix .chat-container { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); } 
        .mode-multi-mix .chat-box { composes: chat-box-resizable; flex-direction: column; height: calc(100vh - 105px); min-height: 450px; }
        .mode-multi-mix .video-frame { display: block; height: 50%; }
        .mode-multi-mix .chat-frame-container { display: block; height: 50%; }

        /* パターンC: コメント欄のみ */
        .mode-chat-only { grid-template-columns: 1fr; }
        .mode-chat-only .main-video-theater { display: none; }
        .mode-chat-only .chat-container { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
        .mode-chat-only .chat-box { flex-direction: column; height: calc(100vh - 105px); }
        .mode-chat-only .video-frame { display: none !important; }
        .mode-chat-only .chat-frame-container { display: block; height: 100%; }

        /* パターンD: 各画面のみ */
        .mode-video-only { grid-template-columns: 1fr; }
        .mode-video-only .main-video-theater { display: none; }
        .mode-video-only .chat-container { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); }
        .mode-video-only .chat-box { flex-direction: column; height: calc(100vh - 105px); }
        .mode-video-only .video-frame { display: block; height: 100%; } 
        .mode-video-only .chat-frame-container { display: none !important; }

        /* 各配信・チャットアイテムのスタイル */
        .main-video-theater iframe { width: 100%; height: 100%; border: none; }
        
        .chat-box {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            border: 1px solid #2d2d2d;
            box-sizing: border-box;
        }
        .chat-header {
            background-color: #2a2a2a;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            overflow: hidden;
            gap: 5px;
            flex-grow: 1;
        }
        .chat-title-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: bold;
            color: #eee;
            max-width: 140px;
        }
        .chat-id-text { color: #888; font-size: 0.75rem; }
        
        .close-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1rem;
            padding-left: 5px;
        }
        .close-btn:hover { color: var(--accent-color); }

        .box-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: calc(100% - 30px);
            overflow: hidden;
        }
        iframe.video-frame { width: 100%; border: none; background: #000; flex-shrink: 0; }
        
        /* 送信欄隠し */
        .chat-frame-container { width: 100%; overflow: hidden; position: relative; }
        iframe.chat-frame { width: 100%; border: none; height: calc(100% + 55px); margin-bottom: -55px; }
        
        .chat-box.selected { border: 2px solid #00ffcc; }
        .set-main-btn {
            background: #333; color: #00ffcc; font-size: 0.7rem; padding: 2px 6px; border-radius: 3px;
            border: none; cursor: pointer; flex-shrink: 0;
        }
        .mode-multi-mix .set-main-btn, .mode-chat-only .set-main-btn, .mode-video-only .set-main-btn { display: none; }

        /* モーダル */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-window {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            width: 480px;
            max-width: 90%;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .modal-title { font-weight: bold; font-size: 1.1rem; color: #eee; }
        .modal-close-btn { background: none; border: none; color: #888; font-size: 1.2rem; cursor: pointer; }
        .modal-close-btn:hover { color: #fff; }
        .modal-body { font-size: 0.85rem; line-height: 1.6; color: #ccc; }
        .modal-body ul { padding-left: 20px; margin: 8px 0; }
        .modal-body li { margin-bottom: 6px; }
        .modal-body strong { color: #fff; }
        .help-alert {
            background-color: #2b2214;
            border: 1px solid #eba134;
            color: #eba134;
            padding: 8px 12px;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<header>
    <div class="controls">
        <div class="layout-selector">
            <button class="layout-btn active" onclick="changeLayout('focus-one', this)">1画面 ＋ コメント欄</button>
            <button class="layout-btn" onclick="changeLayout('multi-mix', this)">画面 ＋ コメント欄</button>
            <button class="layout-btn" onclick="changeLayout('chat-only', this)">コメント欄のみ</button>
            <button class="layout-btn" onclick="changeLayout('video-only', this)">画面のみ</button>
        </div>
        <div class="input-area">
            <input type="text" id="videoTitle" class="input-title" placeholder="タブタイトル">
            <input type="text" id="videoUrl" class="input-url" placeholder="動画ID または URL">
            <button onclick="addStream()">追加</button>
        </div>
        <div class="header-right-btns">
            <button class="refresh-all-btn" onclick="refreshAll()">リフレッシュ</button>
            <button class="help-btn" onclick="toggleModal(true)" title="使い方を見る">?</button>
        </div>
    </div>
</header>

<div class="main-content-area mode-focus-one" id="mainContentArea">
    <div class="main-video-theater" id="mainVideoTheater">
        <iframe id="theaterIframe" src="" data-id="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div class="chat-container" id="chatContainer"></div>
</div>

<div class="modal-overlay" id="helpModal" onclick="toggleModal(false)">
    <div class="modal-window" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div class="modal-title">クイックガイド</div>
            <button class="modal-close-btn" onclick="toggleModal(false)">×</button>
        </div>
        <div class="modal-body">
            <strong>■ 使い方</strong>
            <ul>
                <li><strong>タブタイトル：</strong> 任意入力。配信者名などを入力。</li>
                <li><strong>ID / URL：</strong> URLか11桁のIDを入力して追加。</li>
            </ul>
            <div class="help-alert">
                <strong>⚠️ チャットが表示されない場合：</strong><br>
                「Web Server for Chrome」などのローカルサーバー環境、または公開されたWebサイト上（http:// / https://）でのみ動作します。
            </div>
        </div>
    </div>
</div>

<script>
    let firstVideoId = "";

    function toggleModal(show) {
        const modal = document.getElementById('helpModal');
        if (show) modal.classList.add('open');
        else modal.classList.remove('open');
    }

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url;
    }

    function addStream() {
        const urlInput = document.getElementById('videoUrl');
        const titleInput = document.getElementById('videoTitle');
        const rawUrl = urlInput.value.trim();
        let title = titleInput.value.trim();
        
        if (!rawUrl) return;

        const videoId = extractVideoId(rawUrl);
        if (videoId.length !== 11) {
            alert('入力内容が不正です。');
            return;
        }

        if (!title) title = "配信";

        const container = document.getElementById('chatContainer');
        const chatBox = document.createElement('div');
        chatBox.className = 'chat-box';
        chatBox.dataset.videoid = videoId;

        const currentDomain = window.location.hostname || "localhost";
        const cleanChatUrl = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${currentDomain}&dark_theme=1&is_popout=1&vtype=live`;

        chatBox.innerHTML = `
            <div class="chat-header">
                <div class="chat-header-left">
                    <span class="chat-title-text" title="${title}">${title}</span>
                    <span class="chat-id-text">(${videoId})</span>
                </div>
                <button class="set-main-btn" onclick="setMainVideo('${videoId}', this.closest('.chat-box'))">画面表示</button>
                <button class="close-btn" onclick="removeBox(this.closest('.chat-box'))">×</button>
            </div>
            <div class="box-content">
                <iframe class="video-frame" data-id="${videoId}" src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <div class="chat-frame-container">
                    <iframe class="chat-frame" data-id="${videoId}" src="${cleanChatUrl}"></iframe>
                </div>
            </div>
        `;

        container.appendChild(chatBox);
        
        if (!firstVideoId) {
            setMainVideo(videoId, chatBox);
        }

        urlInput.value = '';
        titleInput.value = '';
    }

    function setMainVideo(videoId, element) {
        firstVideoId = videoId;
        const theater = document.getElementById('theaterIframe');
        theater.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        theater.dataset.id = videoId;
        
        document.querySelectorAll('.chat-box').forEach(box => box.classList.remove('selected'));
        if(element) element.classList.add('selected');
    }

    function removeBox(box) {
        const deletedId = box.dataset.videoid;
        box.remove();
        
        if (firstVideoId === deletedId) {
            const nextBox = document.querySelector('.chat-box');
            if (nextBox) {
                setMainVideo(nextBox.dataset.videoid, nextBox);
            } else {
                firstVideoId = "";
                const theater = document.getElementById('theaterIframe');
                theater.src = "";
                theater.dataset.id = "";
            }
        }
    }

    function refreshAll() {
        // 1. 大画面の更新
        const theater = document.getElementById('theaterIframe');
        if (theater && theater.dataset.id) {
            theater.src = `https://www.youtube.com/embed/${theater.dataset.id}?autoplay=1`;
        }

        // 2. 各小画面の更新
        const videoFrames = document.querySelectorAll('.chat-container .video-frame');
        videoFrames.forEach(frame => {
            if (frame.dataset.id) {
                frame.src = `https://www.youtube.com/embed/${frame.dataset.id}?autoplay=1&mute=1`;
            }
        });

        // 3. 各チャットの更新
        const chatFrames = document.querySelectorAll('.chat-container .chat-frame');
        const currentDomain = window.location.hostname || "localhost";
        chatFrames.forEach(frame => {
            if (frame.dataset.id) {
                frame.src = `https://www.youtube.com/live_chat?v=${frame.dataset.id}&embed_domain=${currentDomain}&dark_theme=1&is_popout=1&vtype=live`;
            }
        });
    }

    function changeLayout(type, btn) {
        const area = document.getElementById('mainContentArea');
        area.classList.remove('mode-focus-one', 'mode-multi-mix', 'mode-chat-only', 'mode-video-only');
        
        if (type === 'focus-one') area.classList.add('mode-focus-one');
        if (type === 'multi-mix') area.classList.add('mode-multi-mix');
        if (type === 'chat-only') area.classList.add('mode-chat-only');
        if (type === 'video-only') area.classList.add('mode-video-only');

        document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    document.getElementById('videoUrl').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addStream();
    });
</script>

</body>
</html>
